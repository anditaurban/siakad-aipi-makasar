<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD AIPI Makassar - Dashboard</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            primary: '#6366f1', // Indigo 500
                            secondary: '#ec4899', // Pink 500
                            dark: '#0f172a', // Slate 900
                            glass: 'rgba(255, 255, 255, 0.05)',
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 20px rgba(99, 102, 241, 0.3)',
                    }
                }
            }
        }
    </script>
    <script>
        // Authentication Guard
        if (localStorage.getItem('siakad_auth') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-active {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body x-data="siakadApp" x-cloak class="antialiased font-sans">

    <!-- Mobile Sidebar Overlay -->
    <div x-show="isMobileMenuOpen" 
         @click="isMobileMenuOpen = false"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black/60 z-40 lg:hidden backdrop-blur-sm">
    </div>

    <!-- Sidebar -->
    <aside :class="isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
           class="fixed top-0 left-0 w-72 h-full glass z-50 transition-transform duration-300 ease-in-out border-r border-white/10">
        
        <!-- Logo -->
        <div class="px-8 py-8 flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-pink-500 flex items-center justify-center shadow-neon">
                <i data-lucide="graduation-cap" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-white leading-tight">AIPI<br><span class="gradient-text">Makassar</span></h1>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="mt-6 px-4 space-y-2">
            <template x-for="item in menuItems" :key="item.id">
                <button @click="currentModule = item.id; isMobileMenuOpen = false"
                        :class="currentModule === item.id ? 'glass-active text-indigo-400' : 'text-slate-400 hover:text-white hover:bg-white/5'"
                        class="w-full flex items-center space-x-3 px-4 py-3 rounded-2xl transition-all duration-200 group">
                    <i :data-lucide="item.icon" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium" x-text="item.name"></span>
                </button>
            </template>
        </nav>

        <!-- User Role Switcher (Mock) -->
        <div class="absolute bottom-8 left-0 w-full px-4">
            <div class="glass rounded-2xl p-4 border border-white/5">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs text-slate-500 uppercase font-bold tracking-widest">Login Sebagai</span>
                    <span class="px-2 py-0.5 bg-indigo-500/20 text-indigo-400 text-[10px] rounded-full font-bold uppercase transition-all duration-300" x-text="userRole"></span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button @click="userRole = 'mahasiswa'" 
                            :class="userRole === 'mahasiswa' ? 'bg-white/10 text-white' : 'text-slate-500'"
                            class="py-2 text-xs rounded-lg transition-colors">Mahasiswa</button>
                    <button @click="userRole = 'dosen'" 
                            :class="userRole === 'dosen' ? 'bg-white/10 text-white' : 'text-slate-500'"
                            class="py-2 text-xs rounded-lg transition-colors">Dosen</button>
                </div>
            </div>

            <!-- Logout Button -->
            <button @click="logout()" 
                    class="w-full mt-4 flex items-center space-x-3 px-4 py-3 rounded-2xl text-red-400 hover:bg-red-500/10 transition-all duration-200 group border border-red-500/10 hover:border-red-500/30">
                <i data-lucide="log-out" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                <span class="font-bold text-sm">Keluar Sistem</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="lg:ml-72 min-h-screen">
        
        <!-- Header / Navbar -->
        <header class="sticky top-0 z-30 px-4 lg:px-8 py-4 bg-slate-900/50 backdrop-blur-md border-b border-white/5">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <button @click="isMobileMenuOpen = true" class="lg:hidden p-2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h2 class="text-lg font-semibold text-white truncate" x-text="getPageTitle()"></h2>
                </div>
                
                <div class="flex items-center space-x-3 lg:space-x-6">
                    <!-- Notifications -->
                    <button class="relative p-2 text-slate-400 hover:text-white transition-colors">
                        <i data-lucide="bell" class="w-6 h-6"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-pink-500 rounded-full animate-ping"></span>
                    </button>
                    
                    <!-- Profile -->
                    <div class="flex items-center space-x-3 pl-4 border-l border-white/10 cursor-pointer group">
                        <div class="hidden lg:block text-right">
                            <p class="text-sm font-bold text-white group-hover:text-indigo-400 transition-colors" x-text="userData[userRole].name"></p>
                            <p class="text-[10px] text-slate-500 font-mono tracking-tighter" x-text="userData[userRole].id"></p>
                        </div>
                        <img :src="'https://api.dicebear.com/7.x/avataaars/svg?seed=' + userData[userRole].name" 
                             class="w-10 h-10 rounded-xl bg-slate-800 p-0.5 border border-white/10 group-hover:border-indigo-500 transition-all duration-300" 
                             alt="Avatar">
                    </div>
                </div>
            </div>
        </header>

        <!-- Dynamic Module Loader -->
        <div class="p-4 lg:p-8">
            <!-- Loading Overlay -->
            <div x-show="isLoading" class="flex items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-indigo-500/30 border-t-indigo-500 rounded-full animate-spin"></div>
            </div>

            <!-- Content Container -->
            <div x-show="!isLoading" 
                 x-transition:enter="transition ease-out duration-500 transform"
                 x-transition:enter-start="opacity-0 translate-y-4"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 id="main-content">
                
                 <!-- Components will be injected here via Alpine -->
                 <div x-html="renderCurrentModule()"></div>
            </div>
        </div>
    </main>

    <!-- App Logic -->
    <script src="js/data.js"></script>
    <script src="js/modules.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Init Lucide Icons after everything loads
        window.addEventListener('load', () => {
            lucide.createIcons();
        });
        
        // Re-init icons after dynamic content update
        window.addEventListener('content-updated', () => {
            setTimeout(() => lucide.createIcons(), 50);
        });
    </script>
</body>
</html>
