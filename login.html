<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD AIPI Makassar - Login</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            primary: '#6366f1',
                            secondary: '#ec4899',
                            dark: '#0f172a',
                            glass: 'rgba(255, 255, 255, 0.05)',
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 20px rgba(99, 102, 241, 0.3)',
                        'neon-pink': '0 0 20px rgba(236, 72, 153, 0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(236, 72, 153, 0.2) 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }
    </style>
</head>
<body x-data="loginApp" x-cloak class="antialiased font-sans min-h-screen flex items-center justify-center p-4 relative">
    
    <!-- Decorative Blobs -->
    <div class="blob top-[-10%] left-[-10%]"></div>
    <div class="blob bottom-[-10%] right-[-10%] opacity-50" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-md">
        <!-- Brand Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-tr from-indigo-500 to-pink-500 shadow-neon mb-6">
                <i data-lucide="graduation-cap" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">SIAKAD <span class="gradient-text">AIPI</span></h1>
            <p class="text-slate-400 font-medium">Sistem Informasi Akademik Terintegrasi</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-[2.5rem] p-8 lg:p-10 border border-white/10 relative shadow-2xl overflow-hidden">
            <!-- Form -->
            <form @submit.prevent="handleLogin" class="space-y-6">
                <!-- Username / NIM -->
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-widest ml-1">NIM / NIDN</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="text" 
                               x-model="username"
                               required
                               placeholder="Masukkan nomor identitas"
                               class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all font-medium">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex items-center justify-between ml-1">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-400 hover:text-indigo-300 transition-colors">Lupa Password?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-indigo-400 transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" 
                               x-model="password"
                               required
                               placeholder="••••••••"
                               class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all font-medium">
                    </div>
                </div>

                <!-- Role Selection -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="button" 
                            @click="role = 'mahasiswa'"
                            :class="role === 'mahasiswa' ? 'bg-indigo-500/20 border-indigo-500/50 text-indigo-400 shadow-neon' : 'bg-white/5 border-white/10 text-slate-500'"
                            class="py-3 px-4 rounded-2xl border font-bold text-xs transition-all duration-300 flex items-center justify-center gap-2">
                        <i data-lucide="graduation-cap" class="w-4 h-4"></i>
                        Mahasiswa
                    </button>
                    <button type="button" 
                            @click="role = 'dosen'"
                            :class="role === 'dosen' ? 'bg-pink-500/20 border-pink-500/50 text-pink-400 shadow-neon-pink' : 'bg-white/5 border-white/10 text-slate-500'"
                            class="py-3 px-4 rounded-2xl border font-bold text-xs transition-all duration-300 flex items-center justify-center gap-2">
                        <i data-lucide="user-check" class="w-4 h-4"></i>
                        Dosen
                    </button>
                </div>

                <!-- Error Message -->
                <template x-if="error">
                    <div x-transition class="bg-red-500/10 border border-red-500/50 text-red-400 p-4 rounded-2xl text-sm flex items-center gap-3">
                        <i data-lucide="alert-circle" class="w-5 h-5"></i>
                        <span x-text="error"></span>
                    </div>
                </template>

                <!-- Submit Button -->
                <button type="submit" 
                        :disabled="isLoading"
                        class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-500/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-3">
                    <span x-show="!isLoading">Masuk Sekarang</span>
                    <div x-show="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    <i x-show="!isLoading" data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-500 text-sm font-medium">Bermasalah saat masuk? <a href="#" class="text-white hover:underline">Hubungi IT Support</a></p>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="mt-12 text-center text-slate-600 text-xs font-bold tracking-widest uppercase">
            &copy; 2026 AIPI Makassar • Innovation for Future
        </p>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginApp', () => ({
                username: '',
                password: '',
                role: 'mahasiswa',
                isLoading: false,
                error: '',

                handleLogin() {
                    this.isLoading = true;
                    this.error = '';

                    // Mock validation
                    setTimeout(() => {
                        // For demo: any username/password works
                        // But let's add a simple check if empty (though required is there)
                        if (this.username && this.password) {
                            localStorage.setItem('siakad_auth', 'true');
                            localStorage.setItem('siakad_user_role', this.role);
                            localStorage.setItem('siakad_user_id', this.username);
                            
                            window.location.href = 'index.html';
                        } else {
                            this.error = 'Silakan masukkan NIM/NIDN dan Password';
                        }
                        this.isLoading = false;
                    }, 1200);
                }
            }));
        });

        window.addEventListener('load', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
